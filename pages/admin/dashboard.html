<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Dashboard - Cleanzy</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="appShell" class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">C</div>
          <div>
            <h1>Cleanzy</h1>
            <p>Admin Portal</p>
          </div>
        </div>

        <div class="session-info">
          <span id="sessionStatus" class="status-pill">Administrator</span>
        </div>

        <section class="panel">
          <div class="panel-header">
            <h2>Notifications</h2>
            <button id="refreshNotificationsButton" class="icon-button" title="Refresh notifications">↻</button>
            <button id="clearNotificationsButton" class="secondary">Clear All</button>
          </div>
          <div id="notificationsList" class="notification-list"></div>
        </section>

        <div class="sidebar-footer">
          <button id="logoutButton" class="danger w-full">Sign Out</button>
        </div>
      </aside>

      <main>
        <header class="topbar">
          <div>
            <p class="eyebrow">Admin workspace</p>
            <h2 id="welcomeTitle">Loading admin...</h2>
          </div>
          <canvas id="opsCanvas" width="360" height="110" aria-label="Cleanzy service activity visual"></canvas>
        </header>

        <section id="messageBar" class="message-bar" hidden></section>

        <!-- Admin Portal -->
        <section id="adminView" class="view active">
          <div class="admin-layout">
            <aside id="analyticsPanel" class="panel analytics-panel collapsed">
              <div class="panel-header">
                <h2>Analytics</h2>
                <div class="panel-header-actions">
                  <button id="backToOverviewButton" class="secondary">← Back to Overview</button>
                  <button id="collapseAnalyticsButton" class="icon-button" title="Close analytics">×</button>
                </div>
              </div>
              <div class="chart-grid analytics-grid">
                <div class="chart-card">
                  <h3>Booking Status Distribution</h3>
                  <div class="canvas-wrapper">
                    <canvas id="bookingsChart" width="320" height="220"></canvas>
                  </div>
                  <div class="download-actions">
                    <button data-download-chart="bookings" data-download-format="pdf">Download PDF</button>
                    <button data-download-chart="bookings" data-download-format="excel">Download Excel</button>
                  </div>
                </div>
                <div class="chart-card">
                  <h3>Users by Role</h3>
                  <div class="canvas-wrapper">
                    <canvas id="usersChart" width="320" height="220"></canvas>
                  </div>
                  <div class="download-actions">
                    <button data-download-chart="users" data-download-format="pdf">Download PDF</button>
                    <button data-download-chart="users" data-download-format="excel">Download Excel</button>
                  </div>
                </div>
                <div class="chart-card wide">
                  <h3>Staff Performance & Earnings (INR)</h3>
                  <div class="canvas-wrapper">
                    <canvas id="performanceChart" width="660" height="240"></canvas>
                  </div>
                  <div class="download-actions">
                    <button data-download-chart="performance" data-download-format="pdf">Download PDF</button>
                    <button data-download-chart="performance" data-download-format="excel">Download Excel</button>
                  </div>
                </div>
              </div>
            </aside>

            <div class="admin-main-content">
              <section class="panel">
                <div class="panel-header">
                  <div>
                    <h2>Operations Overview</h2>
                  </div>
                  <div class="panel-actions">
                    <button id="toggleAnalyticsButton" class="secondary">📊 Analytics</button>
                    <button id="loadAdminButton" class="icon-button" title="Load overview">↻</button>
                  </div>
                </div>
                <div id="adminOverview" class="admin-grid"></div>
              </section>
              <section class="panel">
                <div class="panel-header">
                  <h2>Leave Requests</h2>
                  <button id="loadAdminLeaveRequestsButton" class="icon-button" title="Refresh leave requests">↻</button>
                </div>
                <div id="adminLeaveRequestsContainer"></div>
              </section>
              <section class="panel">
                <div class="panel-header">
                  <h2>Register User</h2>
                </div>
                <div class="register-tab-group">
                  <button id="registerWorkerTab" class="secondary active">Register Worker</button>
                  <button id="registerAdminTab" class="secondary">Register Admin</button>
                </div>
                <div id="registerWorkerForm" class="register-form">
                  <div class="field-grid">
                    <label>Name<input id="registerWorkerName" /></label>
                    <label>Email<input id="registerWorkerEmail" type="email" /></label>
                    <label>Password<input id="registerWorkerPassword" type="password" /></label>
                    <label>Phone<input id="registerWorkerPhone" /></label>
                    <label>Address<input id="registerWorkerAddress" /></label>
                    <label>Skill<input id="registerWorkerSkill" /></label>
                    <label>Coordinates<input id="registerWorkerCoords" /></label>
                  </div>
                  <button id="registerWorkerButton" class="primary w-full">Register</button>
                </div>
                <div id="registerAdminForm" class="register-form" style="display:none;">
                  <div class="field-grid">
                    <label>Name<input id="registerAdminName" /></label>
                    <label>Email<input id="registerAdminEmail" type="email" /></label>
                    <label>Password<input id="registerAdminPassword" type="password" /></label>
                    <label>Phone<input id="registerAdminPhone" /></label>
                    <label>Address<input id="registerAdminAddress" /></label>
                  </div>
                  <button id="registerAdminButton" class="primary w-full">Register</button>
                </div>
              </section>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div id="chartTooltip" class="chart-tooltip" hidden></div>

    <!-- Pay Worker Modal -->
    <div id="payWorkerModal" class="modal-overlay">
      <div class="modal-container">
        <div class="modal-header">
          <h2>Confirm Payment</h2>
          <button id="closePayWorkerModal" class="modal-close">&times;</button>
        </div>
        <div class="modal-body">
          <div class="modal-summary-card">
            <div class="modal-summary-row">
              <span class="modal-summary-label">Worker Name</span>
              <span id="payWorkerName" class="modal-summary-value"></span>
            </div>
            <div class="modal-summary-row">
              <span class="modal-summary-label font-bold text-teal-dark">Amount to Pay</span>
              <span id="payWorkerAmount" class="modal-summary-value font-bold text-teal-dark"></span>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button id="cancelPayWorkerModal">Cancel</button>
          <button id="confirmPayWorkerModal" class="primary">Confirm Payment</button>
        </div>
      </div>
    </div>

    <script type="module" src="/pages/admin/dashboard.js"></script>
  </body>
</html>
