<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Worker Dashboard - Cleanzy</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="appShell" class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">C</div>
          <div>
            <h1>Cleanzy</h1>
            <p>Housekeeper Portal</p>
          </div>
        </div>

        <div class="session-info">
          <span id="sessionStatus" class="status-pill">Worker</span>
        </div>

        <section class="panel">
          <div class="panel-header">
            <h2>Notifications</h2>
            <button id="refreshNotificationsButton" class="icon-button" title="Refresh notifications">↻</button>
            <button id="clearNotificationsButton" class="secondary">Clear All</button>
          </div>
          <div id="notificationsList" class="notification-list"></div>
        </section>

        <div class="sidebar-footer">
          <button id="logoutButton" class="danger w-full">Sign Out</button>
        </div>
      </aside>

      <main>
        <header class="topbar">
          <div>
            <p class="eyebrow">Worker workspace</p>
            <h2 id="welcomeTitle">Loading worker...</h2>
          </div>
          <canvas id="opsCanvas" width="360" height="110" aria-label="Cleanzy service activity visual"></canvas>
        </header>

        <section id="messageBar" class="message-bar" hidden></section>

        <!-- Worker Portal -->
        <section id="workerView" class="view active">
          <div class="grid two">
            <section class="panel">
              <div class="panel-header">
                <h2>Assignments</h2>
                <button id="loadWorkerBookingsButton" class="icon-button" title="Load assignments">↻</button>
              </div>
              <div id="workerBookingsList" class="result-list"></div>
            </section>

            <section class="panel">
              <div class="panel-header">
                <h2>Leave Requests</h2>
                <button id="loadLeaveRequestsButton" class="icon-button" title="Refresh leave requests">↻</button>
              </div>
              <div class="button-row" style="margin-bottom: 12px;">
                <button id="requestLeaveButton" class="primary w-full">Request Leave</button>
              </div>
              <div id="leaveRequestsList" class="result-list"></div>
            </section>

            <section class="panel">
              <div class="panel-header">
                <h2>Attendance</h2>
                <button id="loadAttendanceButton" class="icon-button" title="Load attendance">↻</button>
              </div>
              <div class="button-row">
                <button id="checkInButton" class="primary">Check In</button>
                <button id="checkOutButton">Check Out</button>
              </div>
              <div id="attendanceList" class="result-list"></div>
              <div id="attendanceHistoryContainer"></div>
            </section>

            <section class="panel">
              <div class="panel-header">
                <h2>Earnings</h2>
                <button id="loadEarningsButton" class="icon-button" title="Refresh earnings">↻</button>
              </div>
              <div id="earningsContainer"></div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <!-- Request Leave Modal -->
    <div id="leaveModal" class="modal-overlay">
      <div class="modal-container">
        <div class="modal-header">
          <h2>Request Leave</h2>
          <button id="closeLeaveModal" class="modal-close">&times;</button>
        </div>
        <div class="modal-body">
          <div class="field-grid">
            <label>From Date<input id="leaveFromInput" type="datetime-local" /></label>
            <label>To Date<input id="leaveToInput" type="datetime-local" /></label>
            <label>Remarks / Reason<textarea id="leaveRemarksInput" placeholder="Enter remarks..."></textarea></label>
          </div>
        </div>
        <div class="modal-footer">
          <button id="cancelLeaveModal">Cancel</button>
          <button id="submitLeaveModal" class="primary">Submit</button>
        </div>
      </div>
    </div>

    <script src="/pages/worker/dashboard.js"></script>
  </body>
</html>
