<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cleanzy Operations</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <!-- Centered Login Screen (Displayed when logged out) -->
    <div id="authContainer" class="auth-container">
      <div class="auth-card">
        <div class="brand-header">
          <div class="brand-logo">C</div>
          <h2>Cleanzy Portal</h2>
          <p>Sign in to access your housekeeping workspace</p>
        </div>

        <!-- Role Select Tabs -->
        <div class="role-selector" role="tablist">
          <button class="role-tab active" data-role="User">Customer</button>
          <button class="role-tab" data-role="Worker">Housekeeper</button>
          <button class="role-tab" data-role="Administrator">Administrator</button>
        </div>

        <section id="messageBar" class="message-bar" hidden></section>

        <section class="auth-form-section">
          <!-- Hidden role select to maintain compatibility with app.js API -->
          <select id="registerRole" style="display: none;">
            <option value="User" selected>User</option>
            <option value="Worker">Worker</option>
            <option value="Administrator">Administrator</option>
          </select>

          <div class="field-grid">
            <label>
              Email Address
              <input id="emailInput" type="email" autocomplete="email" value="client@example.com" />
            </label>
            <label>
              Password
              <input id="passwordInput" type="password" autocomplete="current-password" value="SecurePass123!" />
            </label>
          </div>

          <div class="button-row">
            <button id="loginButton" class="primary w-full">Sign In</button>
          </div>

          <div class="auth-divider"><span>or create account</span></div>

          <details id="registerDetails" class="register-details">
            <summary>Create a new account</summary>
            <div class="field-grid compact">
              <label>Name<input id="registerName" value="New Client" /></label>
              <label>Phone<input id="registerPhone" value="9000000000" /></label>
              <label>Address<input id="registerAddress" value="Cleanzy Lane" /></label>
              <label id="registerSkillLabel" style="display: none;">Skill<input id="registerSkill" value="Deep Cleaning" /></label>
              <label id="registerCoordsLabel" style="display: none;">Coordinates<input id="registerCoords" value="12.9716,77.5946" /></label>
            </div>
            <button id="registerButton" class="w-full">Register</button>
          </details>
        </section>
      </div>
    </div>

    <!-- Main Workspace (Moved to separate pages/ dashboards) -->

    <script src="/app.js"></script>
  </body>
</html>
